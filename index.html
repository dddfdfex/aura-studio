<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تطوير الموقع | عداد تقدم تفاعلي ولعبة ترفيهية</title>

    <!-- خط Playpen Sans Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playpen Sans Arabic', 'Segoe UI', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0a0a 0%, #141414 100%);
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 64px;
            padding: 35px 25px 45px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 197, 66, 0.2);
            transition: all 0.3s ease;
        }

        /* اللوجو المخصص SVG */
        .logo {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo svg {
            width: 110px;
            height: 110px;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.4));
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .logo svg:hover {
            transform: scale(1.02) rotate(2deg);
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5c542, #ffde8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .sub-text {
            font-size: 1.05rem;
            color: #cbcbcb;
            max-width: 500px;
            margin: 0 auto 30px auto;
            line-height: 1.5;
            background: rgba(0,0,0,0.3);
            padding: 8px 18px;
            border-radius: 60px;
            display: inline-block;
            width: auto;
        }

        /* قسم العداد - مؤشر التحميل لمدة ساعة */
        .timer-block {
            background: #0e0e12;
            border-radius: 48px;
            padding: 20px 20px 25px;
            margin-bottom: 40px;
            border: 1px solid #2a2a2e;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
        }

        .timer-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f5c542;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .time-digits {
            font-size: 3.8rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 5px;
            background: #010101;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 90px;
            color: #ffdf7e;
            text-shadow: 0 0 6px #f5b81b;
            margin-bottom: 18px;
            border: 1px solid #3a3520;
        }

        .progress-area {
            width: 90%;
            margin: 15px auto;
        }

        .progress-bar-container {
            background: #2a2a2f;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px #00000055;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f5c542, #ffb347);
            width: 100%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s linear;
            box-shadow: 0 0 6px #f5b342;
        }

        .reset-btn {
            background: #2c2c34;
            border: none;
            color: #ffe1a0;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .reset-btn:hover {
            background: #f5c542;
            color: #1f1f1f;
            transform: scale(0.97);
            box-shadow: 0 0 12px #f5c54280;
        }

        .completion-message {
            margin-top: 14px;
            font-weight: 600;
            color: #80ffb2;
            background: #1a3a2a60;
            padding: 6px 12px;
            border-radius: 60px;
            font-size: 0.85rem;
            display: inline-block;
        }

        /* لعبة XO الأنيقة */
        .game-section {
            background: #09090cbb;
            backdrop-filter: blur(5px);
            border-radius: 56px;
            padding: 20px 15px 25px;
            border: 1px solid #f5c54230;
        }

        .game-section h2 {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .game-section h2 span {
            font-size: 1.8rem;
        }

        .game-status {
            font-size: 1.2rem;
            background: #00000066;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            margin: 12px auto 20px;
            font-weight: 500;
            color: #f5e2b0;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 330px;
            margin: 15px auto;
            background: #03030340;
            padding: 10px;
            border-radius: 48px;
        }

        .cell {
            background: #1e1e24;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            font-weight: bold;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.2s ease;
            color: #f5c542;
            text-shadow: 0 2px 5px black;
            border: 1px solid #3f3f46;
            box-shadow: 0 6px 0 #0b0b0e;
        }

        .cell.X {
            color: #ffcc66;
            text-shadow: 0 0 6px #f5a623;
        }
        .cell.O {
            color: #7fe0ff;
            text-shadow: 0 0 5px #2aa9ff;
        }
        .cell:active {
            transform: scale(0.96);
        }
        .disabled-cell {
            cursor: default;
            filter: brightness(0.9);
        }

        .reset-game-btn {
            background: #f5c54220;
            border: 1.5px solid #f5c542;
            color: #ffeaac;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 60px;
            margin-top: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-game-btn:hover {
            background: #f5c542;
            color: #111;
            box-shadow: 0 0 12px #f5c542;
        }

        footer {
            font-size: 0.7rem;
            margin-top: 35px;
            opacity: 0.6;
            color: #aaa;
        }

        @media (max-width: 550px) {
            .container {
                padding: 25px 18px;
            }
            .time-digits {
                font-size: 2.5rem;
                letter-spacing: 2px;
                padding: 5px 18px;
            }
            h1 {
                font-size: 2.4rem;
            }
            .cell {
                font-size: 2.6rem;
                border-radius: 20px;
            }
            .game-board {
                gap: 8px;
            }
        }

        button {
            font-family: 'Playpen Sans Arabic', monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- لوجو تفاعلي SVG -->
    <div class="logo">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="60" cy="60" r="52" stroke="#F5C542" stroke-width="2.5" stroke-dasharray="6 6" fill="#1A1A24"/>
            <path d="M60 25 L68 48 L93 48 L73 61 L81 85 L60 71 L39 85 L47 61 L27 48 L52 48 L60 25Z" fill="#F5C542" stroke="#D9A42E" stroke-width="1.2"/>
            <circle cx="60" cy="60" r="8" fill="#FFE0A3" stroke="#B57C1C" stroke-width="1.5"/>
            <path d="M42 34 L52 42 L42 50" stroke="#FFD966" stroke-width="2" stroke-linecap="round"/>
            <path d="M78 34 L68 42 L78 50" stroke="#FFD966" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </div>

    <h1>⚙️ قيد التطوير</h1>
    <div class="sub-text">نحن نبني شيئاً مميزاً.. شكراً لصبرك الجميل</div>

    <!-- مؤشر التحميل لمدة ساعة -->
    <div class="timer-block">
        <div class="timer-label">⏳ الوقت المتبقي حتى الاكتمال المتوقع</div>
        <div class="time-digits" id="timerDisplay">60:00</div>
        <div class="progress-area">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill" style="width: 100%;"></div>
            </div>
        </div>
        <button class="reset-btn" id="resetTimerBtn">⟳ إعادة ضبط الساعة</button>
        <div id="completionMessage" class="completion-message"></div>
    </div>

    <!-- لعبة إكس-أو للتسلية الخفيفة -->
    <div class="game-section">
        <h2>
            <span>🎮</span> لعبة إكس & أو <span>✨</span>
        </h2>
        <div class="game-status" id="gameStatus">دورك يا بطل! (X)</div>
        <div class="game-board" id="gameBoard"></div>
        <button class="reset-game-btn" id="resetGameBtn">🔄 لعبة جديدة</button>
        <footer style="margin-top: 15px;">⭐ تسلية أثناء الانتظار — العب مع الذكاء الاصطناعي البسيط</footer>
    </div>
    <footer>✨ كل ثانية تقربنا لإطلاق أفضل تجربة</footer>
</div>

<script>
    // -------------------------------
    // 1. المؤقت التنازلي لمدة ساعة (3600 ثانية)
    // -------------------------------
    let remainingSeconds = 3600;       // 60 دقيقة
    let timerInterval = null;
    let timerActive = true;

    const timerDisplayEl = document.getElementById('timerDisplay');
    const progressFillEl = document.getElementById('progressFill');
    const resetTimerBtn = document.getElementById('resetTimerBtn');
    const completionMsgDiv = document.getElementById('completionMessage');

    // تحديث واجهة العداد
    function updateTimerUI() {
        const mins = Math.floor(remainingSeconds / 60);
        const secs = remainingSeconds % 60;
        timerDisplayEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        const percent = (remainingSeconds / 3600) * 100;
        progressFillEl.style.width = `${Math.max(0, percent)}%`;
        
        if (remainingSeconds <= 0) {
            progressFillEl.style.width = '0%';
            if (completionMsgDiv.innerText !== '🎉 تم الانتهاء من التطوير! شكراً لانتظارك 🎉') {
                completionMsgDiv.innerHTML = '🎉 تم الانتهاء من التطوير! شكراً لانتظارك 🎉';
                completionMsgDiv.style.color = '#caffb9';
            }
        } else {
            if (completionMsgDiv.innerText.includes('تم الانتهاء')) {
                completionMsgDiv.innerHTML = '';
            }
        }
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (remainingSeconds > 0) {
                remainingSeconds--;
                updateTimerUI();
                // إذا وصل إلى الصفر نعرض رسالة ونوقف الحركة (لكن يبقى العداد صفر)
                if (remainingSeconds === 0) {
                    stopTimer();
                    updateTimerUI();
                    completionMsgDiv.innerHTML = '🎉 تم الانتهاء من التطوير! شكراً لانتظارك 🎉';
                    completionMsgDiv.style.color = '#b9ffcf';
                }
            } else {
                // عند الصفر نتأكد من إيقاف التحديثات
                if (timerInterval) stopTimer();
            }
        }, 1000);
    }

    function resetTimer() {
        remainingSeconds = 3600;
        updateTimerUI();
        // إذا كانت هناك رسالة اكتمال نظفها
        completionMsgDiv.innerHTML = '';
        // إعادة تشغيل المؤقت إذا كان متوقفاً أو يعمل
        stopTimer();
        startTimer();
        timerActive = true;
    }

    resetTimerBtn.addEventListener('click', () => {
        resetTimer();
        // إضافة تأثير اهتزاز لطيف اختياري
        const btn = resetTimerBtn;
        btn.style.transform = 'scale(0.96)';
        setTimeout(() => { btn.style.transform = ''; }, 150);
    });

    // بدء العداد فور تحميل الصفحة
    startTimer();
    updateTimerUI();

    // -------------------------------
    // 2. لعبة XO (تيك تاك تو) ضد الذكاء الاصطناعي البسيط (عشوائي)
    // -------------------------------
    const boardElement = document.getElementById('gameBoard');
    const gameStatusEl = document.getElementById('gameStatus');
    const resetGameBtn = document.getElementById('resetGameBtn');

    let board = ['', '', '', '', '', '', '', '', ''];
    let gameActive = true;
    let currentPlayer = 'X';   // X هو اللاعب (الإنسان) ، O هو الكمبيوتر
    let lockBoardForAI = false; // لمنع النقر أثناء انتظار حركة الكمبيوتر

    // أنماط الفوز
    const winPatterns = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    function checkWinner(boardState, player) {
        for (let pattern of winPatterns) {
            const [a,b,c] = pattern;
            if (boardState[a] === player && boardState[b] === player && boardState[c] === player) {
                return true;
            }
        }
        return false;
    }

    function isBoardFull() {
        return board.every(cell => cell !== '');
    }

    function updateGameStatus(message, isError = false) {
        gameStatusEl.innerHTML = message;
        if (isError) {
            setTimeout(() => {
                if (gameActive && !lockBoardForAI && currentPlayer === 'X') 
                    gameStatusEl.innerHTML = `🎲 دورك يا لاعب (X)`;
                else if (gameActive && !lockBoardForAI && currentPlayer === 'O')
                    gameStatusEl.innerHTML = `🤖 الكمبيوتر يفكر...`;
            }, 1200);
        }
    }

    function endGame(winner) {
        gameActive = false;
        if (winner === 'X') {
            gameStatusEl.innerHTML = '🏆 فزت أنت! عبقري! 🎉 اضغط لعبة جديدة للمتابعة';
        } else if (winner === 'O') {
            gameStatusEl.innerHTML = '💻 الكمبيوتر فاز هذه المرة! حاول مجدداً 💪';
        } else if (winner === 'tie') {
            gameStatusEl.innerHTML = '🤝 تعادل! أعد المحاولة أو جرب حظك مجدداً 🎲';
        }
    }

    // عرض اللوحة
    function renderBoard() {
        boardElement.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            if (board[i] === 'X') cell.classList.add('X');
            if (board[i] === 'O') cell.classList.add('O');
            cell.textContent = board[i];
            if (!gameActive || lockBoardForAI || board[i] !== '' || currentPlayer !== 'X') {
                cell.classList.add('disabled-cell');
                cell.style.cursor = 'default';
            } else {
                cell.style.cursor = 'pointer';
            }
            cell.addEventListener('click', (function(index) {
                return function() { handleCellClick(index); };
            })(i));
            boardElement.appendChild(cell);
        }
    }

    // حركة اللاعب (X)
    function playerMove(index) {
        if (!gameActive || lockBoardForAI || currentPlayer !== 'X' || board[index] !== '') return false;
        
        // تنفيذ الحركة
        board[index] = 'X';
        renderBoard();

        // فحص الفوز
        if (checkWinner(board, 'X')) {
            endGame('X');
            renderBoard();
            return true;
        }
        if (isBoardFull()) {
            endGame('tie');
            renderBoard();
            return true;
        }

        // تبديل الدور للكمبيوتر
        currentPlayer = 'O';
        gameStatusEl.innerHTML = '🤖 الكمبيوتر يحلل ...';
        renderBoard(); // تحديث القفل لتعطيل النقرات
        
        // استدعاء حركة الكمبيوتر بعد تأخير بسيط (واقعية)
        lockBoardForAI = true;
        setTimeout(() => {
            if (gameActive && currentPlayer === 'O') {
                computerMove();
            } else {
                lockBoardForAI = false;
                renderBoard();
            }
        }, 280);
        return true;
    }

    // حركة الذكاء الاصطناعي (عشوائي من الخلايا الفارغة)
    function computerMove() {
        if (!gameActive || currentPlayer !== 'O') {
            lockBoardForAI = false;
            renderBoard();
            return;
        }
        
        const emptyIndices = board.reduce((acc, cell, idx) => {
            if (cell === '') acc.push(idx);
            return acc;
        }, []);
        
        if (emptyIndices.length === 0) {
            if (isBoardFull() && gameActive) {
                endGame('tie');
            }
            lockBoardForAI = false;
            renderBoard();
            return;
        }
        
        // اختيار عشوائي (بوت بسيط)
        const randomIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        board[randomIndex] = 'O';
        renderBoard();
        
        // فوز للكمبيوتر؟
        if (checkWinner(board, 'O')) {
            endGame('O');
            lockBoardForAI = false;
            renderBoard();
            return;
        }
        if (isBoardFull()) {
            endGame('tie');
            lockBoardForAI = false;
            renderBoard();
            return;
        }
        
        // العودة إلى اللاعب
        currentPlayer = 'X';
        gameStatusEl.innerHTML = '🎮 دورك الآن! (X) اضغط على أي خلية';
        lockBoardForAI = false;
        renderBoard();
        
        // تحقق إضافي: إذا كانت اللعبة غير نشطة لسبب ما
        if (!gameActive) renderBoard();
    }
    
    function handleCellClick(index) {
        if (!gameActive) {
            gameStatusEl.innerHTML = '❗ اللعبة انتهت، اضغط "لعبة جديدة" للاستمرار';
            return;
        }
        if (lockBoardForAI) {
            gameStatusEl.innerHTML = '⏳ انتظر دور الكمبيوتر قليلاً...';
            return;
        }
        if (currentPlayer !== 'X') {
            gameStatusEl.innerHTML = '🤖 ليس دورك الآن، الكمبيوتر يتحرك!';
            return;
        }
        if (board[index] !== '') {
            gameStatusEl.innerHTML = '⚠️ هذه الخانة مشغولة، اختر أخرى';
            setTimeout(() => {
                if (gameActive && currentPlayer === 'X' && !lockBoardForAI) 
                    gameStatusEl.innerHTML = '🎮 دورك الآن! (X)';
            }, 800);
            return;
        }
        
        playerMove(index);
    }

    // إعادة تعيين اللعبة بالكامل
    function resetGame() {
        board = ['', '', '', '', '', '', '', '', ''];
        gameActive = true;
        currentPlayer = 'X';   // اللاعب يبدأ أولاً دائماً
        lockBoardForAI = false;
        // إلغاء أي timer معلق للـ AI (منع تحرك غير مرغوب)
        gameStatusEl.innerHTML = '✨ بداية جديدة! دورك يا بطل (X) ✨';
        renderBoard();
    }
    
    resetGameBtn.addEventListener('click', () => {
        resetGame();
        // نضمن انهاء اي عملية AI عالقة
        if (lockBoardForAI) lockBoardForAI = false;
        gameActive = true;
        currentPlayer = 'X';
        renderBoard();
    });
    
    // تهيئة اللعبة
    function initGame() {
        resetGame();
    }
    
    initGame();
    
    // تحسين إضافي: في حال انتهى العداد التنازلي، لا نؤثر على اللعبة لكن نضيف تأثير بسيط مرحة
    // ربط بسيط: عند انتهاء الساعة، نعطي إيحاء للاعب
    const originalIntervalCheck = setInterval(() => {
        if (remainingSeconds === 0 && gameActive && !lockBoardForAI && currentPlayer === 'X') {
            // مجرد رسالة لطيفة لكن لا نوقف اللعبة
            if (gameStatusEl.innerHTML.includes('دورك') && !gameStatusEl.innerHTML.includes('انتهى التطوير')) {
                gameStatusEl.innerHTML = `🎉 اكتمل التطوير! لكن لا تزال اللعبة مستمرة للتسلية 🎉 — دورك الآن`;
                setTimeout(() => {
                    if (gameActive && currentPlayer === 'X' && !lockBoardForAI)
                        gameStatusEl.innerHTML = '🎮 دورك الآن! (X)';
                }, 2500);
            }
        }
    }, 3000);
    
    // تنظيف الفواصل عند إعادة التوجيه اختياري (لا ضرورة)
    window.addEventListener('beforeunload', () => {
        if (timerInterval) clearInterval(timerInterval);
        clearInterval(originalIntervalCheck);
    });
</script>
</body>
</html>
