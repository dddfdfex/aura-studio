<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد التطوير</title>

    <!-- خط Playpen Sans Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playpen Sans Arabic', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 20px;
        }

        .logo img {
            width: 140px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        h1 {
            font-size: 48px;
            color: #f5c542;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #bdbdbd;
            margin-bottom: 25px;
        }

        .loader {
            width: 120px;
            height: 6px;
            background: #222;
            margin: auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader span {
            display: block;
            height: 100%;
            width: 40%;
            background: #f5c542;
            animation: load 1.5s infinite;
        }

        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- اللوجو -->
        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>

        <!-- النص -->
        <h1>قيد التطوير</h1>
        <p>نحن نعمل على تحسين تجربتك، سيتم إطلاق الموقع قريبًا</p>

        <!-- تحميل وهمي -->
        <div class="loader">
            <span></span>
        </div>

    </div>

</body>
</html>
