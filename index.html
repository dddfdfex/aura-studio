<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>قيد التطوير</title>


<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;
width:100%;

background:#000;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Playpen Sans Arabic',sans-serif;

}





/* الانترو */

.intro{

position:fixed;

inset:0;

background:#000;

display:flex;

justify-content:center;

align-items:center;

z-index:20;

animation:exit 4s forwards;

}



.intro h1{

color:#bcecff;

font-size:34px;

font-weight:800;

animation:intro 3s;

}



@keyframes intro{

from{

opacity:0;

transform:scale(.85);

}


to{

opacity:1;

transform:scale(1);

}

}



@keyframes exit{


85%{

opacity:1;

}


100%{

opacity:0;

visibility:hidden;

}

}




.container{


height:100vh;

width:100%;


display:flex;

flex-direction:column;


justify-content:center;

align-items:center;


text-align:center;

padding:15px;


}





.logo{


width:220px;

max-width:70vw;


}





.title{


margin-top:15px;


font-size:40px;


font-weight:800;


color:#bcecff;


}




.subtitle{


margin-top:8px;


font-size:18px;


color:#b0cbd5;


}




/* العمال 3D */


.workers img{


width:280px;


max-width:80vw;


margin-top:15px;


display:block;


animation:float 3s infinite;


}



@keyframes float{


50%{

transform:translateY(-10px);

}


}






/* العداد */


.timer-box{


margin-top:15px;


width:290px;


padding:18px;


background:#111;


border:1px solid #444;


border-radius:22px;


}



.timer-title{


color:#bcecff;


font-size:16px;


}




#timer{


margin-top:8px;


font-size:38px;


font-family:Arial;


color:white;


letter-spacing:5px;


}





/* مؤشر الموسيقى */


.music-box{


margin-top:18px;


display:flex;


align-items:center;


gap:10px;


background:#111;


padding:10px 18px;


border-radius:30px;


border:1px solid #333;


}



.music-text{


color:#bcecff;


font-size:15px;


}



.wave{


display:flex;


gap:4px;


align-items:center;


}



.wave span{


width:4px;


height:18px;


background:#bcecff;


animation:music 1s infinite;


}


.wave span:nth-child(2){

animation-delay:.2s;

}


.wave span:nth-child(3){

animation-delay:.4s;

}



@keyframes music{


50%{

height:35px;

}


}





.credit{


margin-top:15px;


font-size:18px;


color:#bcecff;


}



</style>

</head>



<body>




<div class="intro">

<h1>

نحن نبني المستقبل

</h1>

</div>





<div class="container">



<img src="logo.png" class="logo">



<div class="title">

قيد التطوير

</div>




<div class="subtitle">

نعمل على تجهيز تجربة استثنائية

</div>






<div class="workers">


<img src="workers-3d.png">

</div>








<div class="timer-box">


<div class="timer-title">

الوقت المتبقي للإطلاق

</div>


<div id="timer">

04:00:00

</div>


</div>






<div class="music-box">


<div class="music-text">

الموسيقى تعمل

</div>


<div class="wave">


<span></span>

<span></span>

<span></span>

<span></span>


</div>


</div>







<div class="credit">

تطوير زياد الدري

</div>




</div>







<audio id="music" src="aura-bg.mp3"></audio>





<script>



setTimeout(()=>{


let audio=document.getElementById("music");


audio.volume=.35;


audio.play();


},4000);







// عداد 4 ساعات


let endTime = Date.now() + 4*60*60*1000;




setInterval(()=>{


let diff=endTime-Date.now();



if(diff<=0){


document.getElementById("timer").innerHTML="تم الإطلاق";


return;


}




let h=Math.floor(diff/3600000);


let m=Math.floor((diff%3600000)/60000);


let s=Math.floor((diff%60000)/1000);




document.getElementById("timer").innerHTML=


String(h).padStart(2,"0")
+
":"
+
String(m).padStart(2,"0")
+
":"
+
String(s).padStart(2,"0");



},1000);



</script>



</body>

</html>
