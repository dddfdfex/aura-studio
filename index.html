<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد التطوير</title>

    <!-- الخط -->
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- أيقونات -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Playpen Sans Arabic',sans-serif;
        }

        body{
            background:#000;
            color:#fff;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            overflow-x:hidden;
        }

        .container{
            width:100%;
            max-width:950px;
            background:#0a0a0a;
            border:1px solid #151515;
            border-radius:30px;
            padding:40px 25px;
            text-align:center;
        }

        /* اللوجو */

        .logo img{
            width:140px;
            margin-bottom:20px;
        }

        /* الترس */

        .gear-box{
            margin-bottom:25px;
        }

        .gear{
            font-size:70px;
            color:#f5c542;
            animation:rotateGear 6s linear infinite;
        }

        @keyframes rotateGear{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

        h1{
            font-size:55px;
            color:#f5c542;
            margin-bottom:10px;
        }

        .desc{
            color:#888;
            font-size:18px;
            line-height:1.8;
            margin-bottom:35px;
        }

        /* شريط التحميل */

        .progress-box{
            margin-bottom:40px;
        }

        .progress{
            width:100%;
            height:16px;
            background:#111;
            border-radius:50px;
            overflow:hidden;
            border:1px solid #1d1d1d;
        }

        .progress span{
            display:block;
            width:0%;
            height:100%;
            background:#f5c542;
            transition:width 1s linear;
        }

        .percent{
            margin-top:15px;
            font-size:22px;
            font-weight:bold;
            color:#f5c542;
        }

        /* اللعبة */

        .game-title{
            font-size:30px;
            margin-bottom:20px;
            color:#f5c542;
        }

        .difficulty{
            margin-bottom:25px;
        }

        .difficulty button{
            background:#111;
            border:1px solid #222;
            color:#f5c542;
            padding:10px 18px;
            border-radius:14px;
            cursor:pointer;
            margin:5px;
            transition:.3s;
            font-size:16px;
        }

        .difficulty button:hover{
            background:#181818;
        }

        /* السكور */

        .score-board{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:25px;
        }

        .score{
            background:#111;
            border:1px solid #1d1d1d;
            padding:15px 25px;
            border-radius:18px;
            min-width:130px;
        }

        .score h3{
            font-size:16px;
            color:#777;
            margin-bottom:5px;
        }

        .score span{
            font-size:28px;
            color:#f5c542;
            font-weight:bold;
        }

        /* XO */

        .board{
            width:330px;
            margin:auto;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:10px;
        }

        .cell{
            width:100px;
            height:100px;
            background:#111;
            border:1px solid #1d1d1d;
            border-radius:18px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:45px;
            color:#f5c542;
            cursor:pointer;
            transition:.2s;
        }

        .cell:hover{
            background:#191919;
        }

        .status{
            margin-top:25px;
            color:#aaa;
            font-size:18px;
        }

        .restart{
            margin-top:20px;
            padding:12px 24px;
            border:none;
            border-radius:16px;
            background:#f5c542;
            color:#000;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        /* الديفولبر */

        .developer{
            margin-top:40px;
            color:#666;
            font-size:15px;
        }

        .developer span{
            color:#f5c542;
            font-weight:bold;
        }

        @media(max-width:600px){

            h1{
                font-size:40px;
            }

            .board{
                width:100%;
            }

            .cell{
                width:100%;
                aspect-ratio:1/1;
                height:auto;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <!-- اللوجو -->
        <div class="logo">
            <img src="logo.png" alt="logo">
        </div>

        <!-- ترس -->
        <div class="gear-box">
            <i class="fa-solid fa-gear gear"></i>
        </div>

        <!-- عنوان -->
        <h1>قيد التطوير</h1>

        <p class="desc">
            يتم حالياً تطوير الموقع وتجهيز تجربة احترافية بالكامل
        </p>

        <!-- التحميل -->
        <div class="progress-box">

            <div class="progress">
                <span id="progressBar"></span>
            </div>

            <div class="percent" id="percent">
                0%
            </div>

        </div>

        <!-- اللعبة -->

        <h2 class="game-title">
            لعبة X O
        </h2>

        <!-- المستويات -->

        <div class="difficulty">

            <button onclick="setDifficulty('easy')">
                سهل
            </button>

            <button onclick="setDifficulty('medium')">
                متوسط
            </button>

            <button onclick="setDifficulty('hard')">
                عالي
            </button>

        </div>

        <!-- السكور -->

        <div class="score-board">

            <div class="score">
                <h3>اللاعب</h3>
                <span id="playerScore">0</span>
            </div>

            <div class="score">
                <h3>الكمبيوتر</h3>
                <span id="aiScore">0</span>
            </div>

            <div class="score">
                <h3>تعادل</h3>
                <span id="drawScore">0</span>
            </div>

        </div>

        <!-- البورد -->

        <div class="board" id="board"></div>

        <div class="status" id="status">
            دورك الآن
        </div>

        <button class="restart" onclick="restartGame()">
            إعادة اللعبة
        </button>

        <!-- الموسيقى -->

        <audio autoplay loop>
            <source src="music.mp3" type="audio/mp3">
        </audio>

        <!-- الديفولبر -->

        <div class="developer">
            Developer <span>Alzoz</span>
        </div>

    </div>

    <script>

        /* تحميل لمدة يوم كامل */

        const progressBar = document.getElementById("progressBar");
        const percent = document.getElementById("percent");

        const totalDuration = 24 * 60 * 60 * 1000; // 24 ساعة

        const startTime = Date.now();

        function updateProgress(){

            const now = Date.now();

            const elapsed = now - startTime;

            let progress = (elapsed / totalDuration) * 100;

            if(progress > 100){
                progress = 100;
            }

            progressBar.style.width = progress + "%";

            percent.innerHTML = progress.toFixed(5) + "%";

            requestAnimationFrame(updateProgress);

        }

        updateProgress();



        /* لعبة XO */

        const board = document.getElementById("board");
        const statusText = document.getElementById("status");

        let cells = [];
        let currentDifficulty = "medium";

        let playerScore = 0;
        let aiScore = 0;
        let drawScore = 0;

        const winPatterns = [

            [0,1,2],
            [3,4,5],
            [6,7,8],

            [0,3,6],
            [1,4,7],
            [2,5,8],

            [0,4,8],
            [2,4,6]

        ];

        function createBoard(){

            board.innerHTML = "";

            cells = Array(9).fill("");

            for(let i=0;i<9;i++){

                const cell = document.createElement("div");

                cell.classList.add("cell");

                cell.dataset.index = i;

                cell.onclick = () => playerMove(i);

                board.appendChild(cell);

            }

        }

        createBoard();

        function playerMove(index){

            if(cells[index] !== "") return;

            cells[index] = "X";

            renderBoard();

            if(checkWinner("X")){

                statusText.innerHTML = "فزت 🎉";

                playerScore++;

                updateScores();

                return;

            }

            if(cells.every(cell => cell !== "")){

                statusText.innerHTML = "تعادل";

                drawScore++;

                updateScores();

                return;

            }

            statusText.innerHTML = "دور الكمبيوتر";

            setTimeout(aiMove,500);

        }

        function aiMove(){

            let move;

            if(currentDifficulty === "easy"){

                move = randomMove();

            }

            else if(currentDifficulty === "medium"){

                move = Math.random() < 0.5
                ? bestMove()
                : randomMove();

            }

            else{

                move = bestMove();

            }

            if(move !== undefined){

                cells[move] = "O";

            }

            renderBoard();

            if(checkWinner("O")){

                statusText.innerHTML = "الكمبيوتر فاز";

                aiScore++;

                updateScores();

                return;

            }

            if(cells.every(cell => cell !== "")){

                statusText.innerHTML = "تعادل";

                drawScore++;

                updateScores();

                return;

            }

            statusText.innerHTML = "دورك الآن";

        }

        function randomMove(){

            let empty = [];

            cells.forEach((cell,index)=>{

                if(cell === ""){

                    empty.push(index);

                }

            });

            return empty[
                Math.floor(Math.random()*empty.length)
            ];

        }

        function bestMove(){

            for(let pattern of winPatterns){

                let [a,b,c] = pattern;

                let values = [
                    cells[a],
                    cells[b],
                    cells[c]
                ];

                if(
                    values.filter(v=>v==="O").length===2
                    &&
                    values.includes("")
                ){

                    return pattern[values.indexOf("")];

                }

            }

            for(let pattern of winPatterns){

                let [a,b,c] = pattern;

                let values = [
                    cells[a],
                    cells[b],
                    cells[c]
                ];

                if(
                    values.filter(v=>v==="X").length===2
                    &&
                    values.includes("")
                ){

                    return pattern[values.indexOf("")];

                }

            }

            if(cells[4] === "") return 4;

            return randomMove();

        }

        function renderBoard(){

            document.querySelectorAll(".cell")
            .forEach((cell,index)=>{

                cell.innerHTML = cells[index];

            });

        }

        function checkWinner(player){

            return winPatterns.some(pattern=>{

                return pattern.every(index => {

                    return cells[index] === player;

                });

            });

        }

        function restartGame(){

            createBoard();

            statusText.innerHTML = "دورك الآن";

        }

        function updateScores(){

            document.getElementById("playerScore")
            .innerHTML = playerScore;

            document.getElementById("aiScore")
            .innerHTML = aiScore;

            document.getElementById("drawScore")
            .innerHTML = drawScore;

            setTimeout(()=>{

                restartGame();

            },1500);

        }

        function setDifficulty(level){

            currentDifficulty = level;

            restartGame();

            if(level === "easy"){

                statusText.innerHTML = "المستوى: سهل";

            }

            else if(level === "medium"){

                statusText.innerHTML = "المستوى: متوسط";

            }

            else{

                statusText.innerHTML = "المستوى: عالي";

            }

        }

    </script>

</body>

</html>
