<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>قيد التطوير</title>


<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

background:#000;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;


font-family:'Playpen Sans Arabic',sans-serif;

color:white;

}



/* الانترو الاحترافي */


.intro{

position:fixed;

inset:0;

background:#000;

display:flex;

justify-content:center;

align-items:center;

z-index:20;


animation:hideIntro 4s forwards;

}



.intro h1{


font-size:55px;

font-weight:700;

color:#fff;


opacity:0;


animation:introShow 3s forwards;


}




@keyframes introShow{


0%{

opacity:0;

letter-spacing:20px;

}


60%{

opacity:1;

}


100%{

opacity:1;

letter-spacing:2px;

}


}



@keyframes hideIntro{


0%{

opacity:1;

}


85%{

opacity:1;

}


100%{

opacity:0;

visibility:hidden;

}


}





.container{


text-align:center;


animation:pageShow 2s;


}



@keyframes pageShow{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

}


}





.logo{


width:430px;


max-width:80vw;


}



.title{


margin-top:25px;


font-size:60px;


font-weight:800;


color:#f5f5f5;



}





.subtitle{


margin-top:15px;


font-size:25px;


color:#bdbdbd;



}



.workers img{


width:480px;


max-width:80vw;


margin-top:20px;


}




.timer-box{


margin:30px auto;


width:380px;


padding:25px;


background:#0c0c0c;


border:1px solid #333;


border-radius:25px;


}



.timer-title{


font-size:20px;


color:#aaa;


}



#timer{


margin-top:15px;


font-size:50px;


font-family:Arial;


letter-spacing:8px;


color:#fff;


}





.credit{


margin-top:25px;


font-size:23px;


color:#aaa;


}




</style>


</head>



<body>




<div class="intro">

<h1>

نحن نبني المستقبل

</h1>

</div>





<div class="container">





<img src="logo.png" class="logo">





<div class="title">

قيد التطوير

</div>




<div class="subtitle">

نعمل على إطلاق تجربة جديدة ومميزة

</div>





<div class="workers">


<img src="workers-3d.png">


</div>






<div class="timer-box">


<div class="timer-title">

الوقت المتبقي للإطلاق

</div>



<div id="timer">

12:00:00

</div>



</div>





<div class="credit">

تطوير زياد الدري

</div>



</div>






<audio id="music" src="aura-bg.mp3"></audio>






<script>



setTimeout(()=>{


let audio=document.getElementById("music");


audio.volume=.35;


audio.play();


},4000);






let end =
Date.now()
+
12*60*60*1000;



setInterval(()=>{


let diff=end-Date.now();



if(diff<=0){

document.getElementById("timer").innerHTML="تم الإطلاق";

return;

}



let h=Math.floor(diff/3600000);

let m=Math.floor((diff%3600000)/60000);

let s=Math.floor((diff%60000)/1000);




document.getElementById("timer").innerHTML=

String(h).padStart(2,"0")
+
":"
+
String(m).padStart(2,"0")
+
":"
+
String(s).padStart(2,"0");



},1000);



</script>



</body>

</html>
